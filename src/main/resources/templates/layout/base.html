<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="html(content, pageTitle)">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle != null ? pageTitle + ' | Dentik' : 'Dentik'}">Dentik</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/bootstrap/css/bootstrap.min.css}" />
    <!-- AdminLTE CSS -->
    <link rel="stylesheet" th:href="@{/adminlte/css/adminlte.min.css}" />
    <!-- FontAwesome -->
    <link rel="stylesheet" th:href="@{/fontawesome/css/all.min.css}" />
</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">

    <!-- ======= NAVBAR ======= -->
    <nav class="app-header navbar navbar-expand bg-body">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
                        <i class="bi bi-list"></i>
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="fas fa-user-circle fa-lg"></i>
                        <span class="ms-1" th:text="${usuarioActual != null ? usuarioActual : 'Admin'}">Admin</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- ======= SIDEBAR ======= -->
    <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
        <div class="sidebar-brand">
            <a th:href="@{/}" class="brand-link">
                <span class="brand-text fw-light">
                    <i class="fas fa-tooth me-2"></i>Dentik
                </span>
            </a>
        </div>

        <div class="sidebar-wrapper">
            <nav class="mt-2">
                <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview"
                    role="menu" data-accordion="false">

                    <li class="nav-header">GESTIÓN</li>

                    <li class="nav-item">
                        <a th:href="@{/pacientes}" class="nav-link">
                            <i class="nav-icon fas fa-users"></i>
                            <p>Pacientes</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a th:href="@{/usuarios}" class="nav-link">
                            <i class="nav-icon fas fa-user-cog"></i>
                            <p>Usuarios</p>
                        </a>
                    </li>

                </ul>
            </nav>
        </div>
    </aside>

    <!-- ======= CONTENIDO PRINCIPAL ======= -->
    <main class="app-main">
        <div class="app-content-header">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-sm-6">
                        <h3 class="mb-0" th:text="${pageTitle}">Página</h3>
                    </div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-end">
                            <li class="breadcrumb-item">
                                <a th:href="@{/}">Inicio</a>
                            </li>
                            <li class="breadcrumb-item active" th:text="${pageTitle}">Página</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <div class="app-content">
            <div class="container-fluid">
                <!-- Aquí se inyecta el contenido de cada vista -->
                <th:block th:replace="${content}"></th:block>
            </div>
        </div>
    </main>

    <!-- ======= FOOTER ======= -->
    <footer class="app-footer">
        <div class="float-end d-none d-sm-inline">Dentik v1.0</div>
        <strong>
            <span>Dentik</span> &mdash;
            <span>Sistema de Gestión Dental</span>
        </strong>
    </footer>

</div>

<!-- Bootstrap JS -->
<script th:src="@{/bootstrap/js/bootstrap.bundle.min.js}"></script>
<!-- AdminLTE JS -->
<script th:src="@{/adminlte/js/adminlte.min.js}"></script>

</body>
</html>
